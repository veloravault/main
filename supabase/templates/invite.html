<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Your Velora Vault invitation is ready</title>
  </head>
  <body style="margin:0;background:#f5f5f7;color:#1d1d1f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f5f7;padding:40px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:560px;background:#ffffff;border:1px solid #e5e5ea;border-radius:24px;padding:40px;">
            <tr>
              <td>
                <p style="margin:0 0 24px;color:#6e6e73;font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;">Velora Vault</p>
                <h1 style="margin:0 0 16px;font-size:32px;line-height:1.15;letter-spacing:-.025em;">Your invitation is ready.</h1>
                <p style="margin:0 0 28px;color:#515154;font-size:17px;line-height:1.55;">Use the secure button below to finish setting up your account.</p>
                <p style="margin:0 0 28px;">
                  <a href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&amp;type=invite" style="display:inline-block;border-radius:999px;background:#0071e3;color:#ffffff;font-size:16px;font-weight:650;line-height:1;padding:15px 24px;text-decoration:none;">Accept invitation</a>
                </p>
                <p style="margin:0;color:#86868b;font-size:14px;line-height:1.5;">If you did not expect this invitation, you can ignore this email.</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
